name: CI

# Enforces the hermetic gates the project already defines but until now ran only
# by hand: formatting (black) and the unit / synthetic test suite. The real-data
# benchmarks (CTU-13, CICIDS, Bournemouth) need large, licence-bound, gitignored
# datasets, so their tests skip when the data is absent — they remain a
# local/manual gate by design (see AGENTS.md, "Build, run, validate"). CI runs
# without the `eif` extra: the Extended Isolation Forest backend falls back
# cleanly and the hermetic suite passes either way, keeping CI off a compiled
# dependency.

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies (locked)
        run: uv sync --frozen

      - name: Formatting gate (black)
        run: uv run black --check .

      - name: Hermetic test suite
        run: uv run pytest -q
