name: CI

# Enforces the hermetic gates the project already defines but until now ran only
# by hand: formatting (black) and the unit / synthetic test suite. Installs the
# `eif` extra so the Extended Isolation Forest is the active backend — the
# detection-quality gates (e.g. mechanical_timing recall >= 0.85) are calibrated
# for it, and the dependency-free fallback scorer is weaker, so those tests fail
# without it. The real-data benchmarks (CTU-13, CICIDS, UNSW, Bournemouth) need
# large, licence-bound, gitignored datasets, so their tests skip when the data is
# absent — they remain a local/manual gate by design (see AGENTS.md,
# "Build, run, validate").

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies (locked, with EIF backend)
        run: uv sync --frozen --extra eif

      - name: Formatting gate (black)
        run: uv run black --check .

      - name: Hermetic test suite (EIF backend; real-data benchmarks skip)
        run: uv run --extra eif pytest -q
