# Mechanical enforcement of guardrails the project currently follows by
# convention. Install once with:  uvx pre-commit install --install-hooks
#                                  uvx pre-commit install --hook-type pre-push
# (pre-commit is a developer-machine tool run via uvx, not a project dependency;
#  the hooks themselves use the project's own uv-run tools, so versions never
#  drift from pyproject / uv.lock.)
repos:
  - repo: local
    hooks:
      # --- pre-commit: fast, every commit ------------------------------------
      # Scoped to the commit stage only. Without an explicit `stages` a hook runs
      # at EVERY installed stage, so these would also fire at pre-push — and the
      # main-guard would then wrongly refuse a legitimate `git push origin main`
      # of already-reviewed, fast-forwarded work (its intent is to block *commits*
      # on main, not pushes).
      - id: black
        name: black (format check)
        entry: uv run black --check
        language: system
        types: [python]
        stages: [pre-commit]

      - id: no-commit-to-main
        name: no direct commits to main (AGENTS.md §6)
        entry: bash -c 'branch=$(git rev-parse --abbrev-ref HEAD); if [ "$branch" = "main" ]; then echo "Refusing to commit to main — branch and route through review (AGENTS.md §6)."; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # --- pre-push: slower, before sharing ----------------------------------
      - id: pytest-hermetic
        name: hermetic test suite (EIF backend)
        entry: uv run --extra eif pytest -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
